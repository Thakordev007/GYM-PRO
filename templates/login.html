{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GYM PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="{% url 'index' %}" class="brand"><span></span>GYM PRO</a>
            <h2>Welcome Back</h2>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {% if message.tags == 'success' %}success{% else %}error{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="input-box">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="input-box">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn" style="width:100%;margin-top:8px;">Login</button>
            </form>

            <div class="auth-link">
                Don't have an account? <a href="{% url 'register' %}">Register</a>
            </div>
            <div class="auth-link" style="margin-top:10px;">
                <a href="{% url 'index' %}">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
